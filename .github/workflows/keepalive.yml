name: Keep Render Server Awake

on:
  schedule:
    # Run every 10 minutes to prevent Render free tier from sleeping (15-min limit)
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Portfolio Server
        # We use a standard browser User-Agent to bypass Render's bot filtering. 
        # Render ignores known pinging bots like UptimeRobot in their keep-alive policy.
        run: |
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               -sL -w "HTTP Status: %{http_code}\n" -o /dev/null \
               https://hanody1x-1-n380.onrender.com/api/healthz
